<ion-content fullscreen>
  <main class="login-page">
    <section class="login-card panel">
      <div class="brand">
        <div class="logo">
          <ion-icon name="radio-outline"></ion-icon>
        </div>
        <h1>Smoke IoT</h1>
        <p>Ingreso al sistema de monitoreo</p>
      </div>

      <form (ngSubmit)="submit()">
        <ion-item lines="none">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-label position="stacked">Usuario</ion-label>
          <ion-input [(ngModel)]="username" name="username" autocomplete="username"></ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input [(ngModel)]="password" name="password" type="password" autocomplete="current-password"></ion-input>
        </ion-item>

        @if (errorMessage) {
          <div class="error">{{ errorMessage }}</div>
        }

        <ion-button type="submit" expand="block" [disabled]="loading">
          @if (loading) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            Ingresar
          }
        </ion-button>
      </form>
    </section>
  </main>
</ion-content>
